  <desc id="desc">Bold stacked text logo reading The Scrap Company in white with transparent background.</desc>
  <g fill="#ffffff" font-family="Impact, Haettenschweiler, 'Arial Narrow Bold', sans-serif" font-weight="700" letter-spacing="1.2">
